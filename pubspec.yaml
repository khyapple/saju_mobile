name: saju_mobile
description: "사주 AI 분석 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  go_router: ^14.8.1
  http: ^1.2.2
  flutter_markdown: ^0.7.6
  google_fonts: ^6.2.1
  provider: ^6.1.2
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  font_awesome_flutter: ^10.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/images/logo.png"
  remove_alpha_ios: true

# 네이티브 런치 화면 — 어두운 배경만 보여주고 로고(한자)는 표시하지 않는다.
# Flutter 쪽 SplashScreen이 바로 이어서 로고 애니메이션을 재생한다.
# 적용하려면: `dart run flutter_native_splash:create`
flutter_native_splash:
  color: "#05051A"            # 코스믹 딥 배경
  android_12:
    color: "#05051A"
    icon_background_color: "#05051A"
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: ShillaCulture
      fonts:
        - asset: assets/fonts/Shilla_Culture_B.ttf
          weight: 700
